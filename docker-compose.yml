version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: earthquake-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: earthquake-nginx
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: earthquake-mysql
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: earthquake_safety
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  swagger:
    image: swaggerapi/swagger-ui
    container_name: earthquake-swagger
    ports:
      - "8081:8080"
    volumes:
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml
    environment:
      SWAGGER_JSON: /usr/share/nginx/html/openapi.yaml
    depends_on:
      - app

volumes:
  mysql_data:
