services:
  mysql:
    image: mysql:8.0
    container_name: earthquake-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: earthquake
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: earthquake-app
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: earthquake
      DB_USERNAME: root
      DB_PASSWORD: root

  nginx:
    image: nginx:1.27-alpine
    container_name: earthquake-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: earthquake-swagger-ui
    ports:
      - "8081:8080"
    volumes:
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml
    environment:
      SWAGGER_JSON: /usr/share/nginx/html/openapi.yaml
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: earthquake-frontend
    working_dir: /app
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    command: npm run dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

volumes:
  mysql_data:
