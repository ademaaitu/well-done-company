openapi: 3.0.3
info:
  title: Earthquake Safety Test API
  version: 2.0.0
  description: Commercial-grade interactive earthquake safety learning API.

servers:
  - url: http://localhost:8000

tags:
  - name: Learning
  - name: Results
  - name: Admin

paths:
  /api/session/start:
    post:
      tags: [Learning]
      summary: Start learning session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_name]
              properties:
                user_name: { type: string }
                module_id: { type: integer }
                stress_context: { type: string }
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string }
                  started_at: { type: string, format: date-time }

  /api/session/events:
    post:
      tags: [Results]
      summary: Track session event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, event_name]
              properties:
                session_id: { type: string }
                event_name: { type: string }
                payload: { type: object }
      responses:
        "200":
          description: Event tracked

  /api/resources:
    get:
      tags: [Learning]
      summary: Get checklist and safety resources
      responses:
        "200":
          description: Checklist and links

  /api/modules:
    get:
      tags: [Learning]
      summary: Get modules
      responses:
        "200":
          description: Module list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  /api/modules/{id}/scenarios:
    get:
      tags: [Learning]
      summary: Get scenarios by module and stress context
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: stress_context
          schema:
            type: string
            enum: [bus, mall, office]
      responses:
        "200":
          description: Scenario list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scenario"

  /api/modules/{id}/scenarios/next:
    get:
      tags: [Learning]
      summary: Dynamic next scenario loader
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: stress_context
          required: true
          schema:
            type: string
        - in: query
          name: current_branching_id
          schema:
            type: string
        - in: query
          name: selected_option
          schema:
            type: string
      responses:
        "200":
          description: Next scenario or null when flow completes
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Scenario"
                  - type: "null"

  /api/modules/{id}/submit:
    post:
      tags: [Results]
      summary: Submit session answers and score
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequest"
      responses:
        "200":
          description: Structured result model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultSummary"

  /api/results/{user_name}:
    get:
      tags: [Results]
      summary: Get user result history
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: user_name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Result history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultFull"

  /api/admin/analytics-summary:
    get:
      tags: [Admin]
      summary: Aggregated analytics summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /api/admin/risk-distribution:
    get:
      tags: [Admin]
      summary: Risk category distribution
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Distribution by risk category
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    risk_category:
                      type: string
                    total:
                      type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Module:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }

    Scenario:
      type: object
      properties:
        id: { type: integer }
        module_id: { type: integer }
        branching_id: { type: string }
        stress_context: { type: string, nullable: true }
        question: { type: string }
        options:
          type: object
          additionalProperties:
            type: string
        correct_answer: { type: string }
        wrong_explanation: { type: string, nullable: true }
        next_branching_map:
          type: object
          additionalProperties:
            type: string
          nullable: true
        branching_logic:
          type: object
          nullable: true

    UserAnswer:
      type: object
      required: [scenario_id, selected_option]
      properties:
        scenario_id: { type: integer }
        selected_option: { type: string }
        response_time_ms: { type: integer }
        retries: { type: integer }
        wrong_explanation_shown: { type: boolean }

    SubmitRequest:
      type: object
      required: [user_name, stress_context, answers]
      properties:
        user_name: { type: string }
        stress_context: { type: string }
        session_id: { type: string }
        answers:
          type: array
          items:
            $ref: "#/components/schemas/UserAnswer"

    ResultSummary:
      type: object
      properties:
        session_id: { type: string }
        user_name: { type: string }
        module_id: { type: integer }
        total_score: { type: integer }
        accuracy_score: { type: integer }
        reaction_risk_index: { type: integer }
        stress_response_score: { type: integer }
        overall_preparedness_percent: { type: integer }
        risk_category:
          type: string
          enum: [Low, Moderate, High]
        behavioral_analysis: { type: string }
        personalized_checklist:
          type: array
          items: { type: string }
        recommendation:
          type: string
          enum: [Needs improvement, Good, Excellent]

    ResultFull:
      allOf:
        - $ref: "#/components/schemas/ResultSummary"
        - type: object
          properties:
            progress:
              type: array
              items:
                type: object
            session_json:
              type: object

    AnalyticsSummary:
      type: object
      properties:
        total_sessions: { type: integer }
        avg_accuracy_score: { type: number, format: float }
        avg_reaction_risk_index: { type: number, format: float }
        avg_stress_response_score: { type: number, format: float }
        avg_overall_preparedness_percent: { type: number, format: float }
        avg_response_time_ms: { type: number, format: float }
        avg_retries: { type: number, format: float }
